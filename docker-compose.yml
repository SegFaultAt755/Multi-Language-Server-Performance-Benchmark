services:
  db:
    image: postgres:17-bookworm
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: bird_brain
      POSTGRES_DB: benchmark_db
    ports:
      - "5432:5432"
    volumes:
      - ./db/migrations/create_users_table.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    # Making adjustments, to make the database to work as fast as possible
    command: [
        "postgres", 
        "-c", "max_connections=200", 
        "-c", "shared_buffers=256MB", 
        "-c", "fsync=off", 
        "-c", "synchronous_commit=off"
    ]
